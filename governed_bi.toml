# Project-level configuration for governed-bi.
#
# One source of truth for model choices and environment toggles, parsed by
# governed_bi.config.load_settings(). Swapping a model is an edit here, not a
# code change.
#
# SECURITY: never put an API key in this file. The key is read at call time from
# the environment variable named by [models].api_key_env (default OPENAI_API_KEY).

[runtime]
# dev  = BIRD scale: auto-accept corpus, single all-access identity, hard-block
#        suspect columns, files + SQLite.
# prod = enterprise scale: PR + owner + CI, real user + gateway RLS, soft-warn.
environment = "dev"

[models]
# Provider-agnostic by shape; OpenAI by current project decision.
provider = "openai"

# LLM used by the curator proposer and the server SQL generator.
# gpt-5.5 = the current generally-available flagship. (gpt-5.6-sol, the GPT-5.6
# flagship tier, is limited-preview and 404s on accounts without access — switch
# back to it here once your account is enabled.)
llm_model = "gpt-5.5"
llm_reasoning_effort = "low"     # none | low | medium | high | xhigh | max

# Embedding model for the retrieval vector channel and the SQL semantic cache.
# The search space is small, so a compact model is enough; swap freely.
embedding_model = "text-embedding-3-small"

# Environment variable that holds the API key (the key itself never lives here).
api_key_env = "OPENAI_API_KEY"

[datasource]
# Which database the engine + curator read. Default: the vendored SQLite fixture,
# so the offline demo and tests need no change. Built into a Connector by
# governed_bi.gateway.build_connector; the curator facts builder
# (python -m governed_bi.curator.build) reads this too.
kind = "sqlite"                                 # sqlite | postgres | redshift
db = "beer_factory"                             # db_id / corpus namespace
sqlite_path = "data/bird/beer_factory.sqlite"   # repo-root-relative

# To profile a BIRD-Obfuscation Postgres instance instead (e.g. the renamed+decoy
# one), set the fields below. The DSN carries a password, so it is NOT stored
# here: point dsn_env at an env var holding the full libpq DSN. The renamed+decoy
# instance is pg_rename_decoy (local docker port 5435; behind the `decoy` compose
# profile) — see BIRD-Data-Obfuscation/docker-compose.yml and its .env.example.
#   kind = "postgres"
#   db = "beer_factory"       # corpus namespace; also the per-db_id schema below
#   schema = "beer_factory"   # BIRD stores one schema per db_id
#   dsn_env = "PG_RENAME_DECOY_DSN"
