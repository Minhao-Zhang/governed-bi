name: CI

# Enforce the PR-gated governance narrative the docs describe: corpus validation
# (D9) + the full test suite must pass on every push/PR. The deterministic core
# runs offline (no OpenAI key, no network); all deps live in core (no
# optional-dependency extras), so the LangGraph-equivalence and HTTP-API tests RUN
# here rather than being silently skipped.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      # All deps live in core (no optional-dependency extras), so a plain sync
      # installs the LangGraph/deepagents/LangChain harnesses + FastAPI — which is
      # what makes the LangGraph-equivalence and HTTP-API tests execute instead of
      # `importorskip`-skipping.
      - name: Sync (all deps)
        run: uv sync

      # The governed end-to-end tests execute against the committed BIRD database.
      # Fail loudly if it is ever removed, rather than letting the highest-value
      # integration tests silently skip (the reproducible-demo gap a review flagged).
      - name: Require the committed demo database
        run: test -f data/bird/beer_factory.sqlite

      # Corpus validation is the curator's "done-enough" gate (D9): ID conventions
      # + reference integrity across every db under corpus/.
      - name: Validate corpus
        run: uv run python -m governed_bi.corpus.cli

      # -rs surfaces the reason for any skip in the log, so a newly-skipped
      # integration path is visible in review even when the suite is green.
      - name: Run tests
        run: uv run pytest -q -rs
