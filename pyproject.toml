[project]
name = "governed-bi"
version = "0.1.0"
description = "Agentic BI: natural-language questions to grounded, governed, auditable answers over relational data."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Minhao Zhang" }]
dependencies = [
    # Corpus asset schemas (Facts / Inference / Audit tiers) and validation.
    "pydantic>=2.7",
    # YAML typed assets are the source of truth (D9).
    "pyyaml>=6.0",
    # In-memory property graph + Steiner-tree join planning (BIRD scale).
    "networkx>=3.3",
    # SQL parsing for the AST column-allowlist guardrail (server L3).
    "sqlglot>=25.0",
]

[project.optional-dependencies]
# DB connectors beyond SQLite (which is stdlib). Installed only when targeting
# these engines; the connector code imports the driver lazily.
postgres = ["psycopg[binary]>=3.1"]
redshift = ["redshift-connector>=2.1"]
# The audit/edit cockpit (viz). Streamlit is the current frontend, isolated to
# governed_bi.viz.app; the UI-agnostic view models in governed_bi.viz.presenter
# carry no UI dependency, so a different frontend swaps in app.py alone.
viz = ["streamlit>=1.30"]
# The LLM + embedding seams (governed_bi.llm). Imported lazily, so the engine
# runs on the deterministic offline clients without it; install to use the
# OpenAI-backed generator, curator proposer, vector retrieval, and SQL cache.
openai = ["openai>=1.40"]
# The agent harnesses: server = LangGraph StateGraph DAG, curator = deepagents,
# with LangChain-backed model/embedding clients. Imported only by the harness
# modules (governed_bi.server.graph, governed_bi.curator.deep_agent, and the
# LangChain clients in governed_bi.llm); the deterministic core runs without them.
agents = [
    "langgraph>=1.0",
    "langchain>=1.0",
    "langchain-openai>=1.0",
    "deepagents>=0.6",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/governed_bi"]
