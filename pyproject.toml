[project]
name = "governed-bi"
version = "0.1.0"
description = "Agentic BI: natural-language questions to grounded, governed, auditable answers over relational data."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Minhao Zhang" }]
dependencies = [
    # Corpus asset schemas (Facts / Inference / Audit tiers) and validation.
    "pydantic>=2.7",
    # YAML typed assets are the source of truth (D9).
    "pyyaml>=6.0",
    # In-memory property graph + Steiner-tree join planning (BIRD scale).
    "networkx>=3.3",
    # SQL parsing for the AST column-allowlist guardrail (server L3).
    "sqlglot>=25.0",
]

[project.optional-dependencies]
# Heavy agent frameworks are deferred until the harnesses are built:
#   curator -> deepagents ; server -> langgraph + middleware.
# Add them here (or as their own extras) when that work starts.

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/governed_bi"]
